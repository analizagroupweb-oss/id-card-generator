<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgba(11, 58, 100, 0.12), transparent 28%),
          linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        color: #0f172a;
      }

      .not-found-card {
        width: min(92vw, 34rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.14);
        text-align: center;
      }

      .not-found-card h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 5vw, 3rem);
        color: #0b3a64;
      }

      .not-found-card p {
        margin: 0 0 1.5rem;
        line-height: 1.6;
        color: #475569;
      }

      .not-found-card a {
        display: inline-block;
        padding: 0.85rem 1.2rem;
        border-radius: 999px;
        background: #0b3a64;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="not-found-card">
      <h1>404</h1>
      <p>The page you requested could not be found. Return to the ID Card Portal home page.</p>
      <a href="./index.html">Open Portal</a>
    </main>
  </body>
</html>
